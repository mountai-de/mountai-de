name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SITE_URL: https://mountai.de
  BASE_PATH: /

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Astro
        run: bun run build
        env:
          SITE_URL: ${{ env.SITE_URL }}
          BASE_PATH: ${{ env.BASE_PATH }}

      - name: Deploy to VPS via rsync
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --delete
          path: ./dist/
          remote_path: /var/www/mountai.de/
          remote_host: 49.12.5.199
          remote_port: 2323
          remote_user: deploy
          remote_key: ${{ secrets.VPS_SSH_KEY }}
